<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Live workflow graph for local Wiff runs." />
<title>wiff</title>
<link rel="preconnect" href="https://rsms.me/" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<style>
  :root {
    --surface: #fffefd;
    --surface-2: #f8f6f4;
    --surface-3: rgb(39 39 42 / 0.06);
    --canvas: #f5f1ee;
    --node: #ffffff;
    --ink: #202024;
    --ink-2: #62626b;
    --ink-3: #787880;
    --line: rgb(39 39 42 / 0.08);
    --line-strong: rgb(39 39 42 / 0.15);
    --edge: #dedbd8;
    --hover: rgb(39 39 42 / 0.04);
    --active: rgb(39 39 42 / 0.065);
    --overlay: rgb(24 24 27 / 0.28);
    --shadow-xs: 0 1px 2px rgb(24 24 27 / 0.05), 0 4px 18px rgb(24 24 27 / 0.035);
    --shadow-card: 0 20px 60px rgb(75 60 48 / 0.08), 0 2px 8px rgb(75 60 48 / 0.035);
    --shadow-sheet: -16px 0 48px rgb(24 24 27 / 0.12);
    --running: #2f6bd8;
    --good: #16a663;
    --bad: #df5a43;
    --warn: #bd7b15;
    --cached: #7c7c86;
    --pending: #b8b8bf;
    --running-bg: #edf3ff;
    --good-bg: #ebf8f1;
    --bad-bg: #fff0ed;
    --warn-bg: #fff6e6;
    --cached-bg: #f1f1f3;
    --vj-bg: var(--surface-2);
    --vj-bg-panel: var(--surface);
    --vj-bg-hover: var(--hover);
    --vj-bg-selected: color-mix(in srgb, var(--running) 13%, var(--surface));
    --vj-bg-selected-muted: var(--active);
    --vj-text: var(--ink);
    --vj-text-dim: var(--ink-2);
    --vj-text-dimmer: var(--ink-3);
    --vj-text-muted: var(--ink-3);
    --vj-text-selected: var(--ink);
    --vj-border: var(--line-strong);
    --vj-border-subtle: var(--line);
    --vj-accent: var(--running);
    --vj-accent-muted: color-mix(in srgb, var(--running) 18%, transparent);
    --vj-string: #087a57;
    --vj-number: #9a5a13;
    --vj-boolean: #7253b4;
    --vj-error: var(--bad);
    --vj-font: ui-monospace, "SF Mono", "Geist Mono", Menlo, monospace;
  }

  [data-theme="dark"] {
    --surface: #101011;
    --surface-2: #151516;
    --surface-3: rgb(255 255 255 / 0.08);
    --canvas: #0b0b0c;
    --node: #19191b;
    --ink: #fafafa;
    --ink-2: #b2b2bb;
    --ink-3: #92929c;
    --line: rgb(255 255 255 / 0.085);
    --line-strong: rgb(255 255 255 / 0.16);
    --edge: #343438;
    --hover: rgb(255 255 255 / 0.05);
    --active: rgb(255 255 255 / 0.08);
    --overlay: rgb(0 0 0 / 0.58);
    --shadow-xs: 0 1px 0 rgb(255 255 255 / 0.03);
    --shadow-card: 0 24px 70px rgb(0 0 0 / 0.3);
    --shadow-sheet: -16px 0 48px rgb(0 0 0 / 0.32);
    --running: #74a2f2;
    --good: #52c78a;
    --bad: #f28c75;
    --warn: #e8ad51;
    --cached: #9898a1;
    --pending: #5c5c64;
    --running-bg: #1b2942;
    --good-bg: #163126;
    --bad-bg: #3b211d;
    --warn-bg: #392c17;
    --cached-bg: #262629;
    --vj-bg: var(--surface-2);
    --vj-bg-panel: var(--node);
    --vj-bg-hover: var(--hover);
    --vj-bg-selected: color-mix(in srgb, var(--running) 18%, var(--surface));
    --vj-bg-selected-muted: var(--active);
    --vj-text: var(--ink);
    --vj-text-dim: var(--ink-2);
    --vj-text-dimmer: var(--ink-3);
    --vj-text-muted: var(--ink-3);
    --vj-text-selected: var(--ink);
    --vj-border: var(--line-strong);
    --vj-border-subtle: var(--line);
    --vj-accent: var(--running);
    --vj-accent-muted: color-mix(in srgb, var(--running) 22%, transparent);
    --vj-string: #76d6a8;
    --vj-number: #efbd70;
    --vj-boolean: #a9bff5;
    --vj-error: var(--bad);
    --vj-font: ui-monospace, "SF Mono", "Geist Mono", Menlo, monospace;
    color-scheme: dark;
  }

  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
    background: var(--canvas);
    color: var(--ink);
    font-family: InterVariable, Inter, ui-sans-serif, system-ui, sans-serif;
    font-feature-settings: "cv02", "cv03", "cv04", "cv11";
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  button { font: inherit; }
  code, .mono, kbd {
    font-family: ui-monospace, "SF Mono", "Geist Mono", Menlo, monospace;
    font-size: 12px;
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 999px; }
  ::-webkit-scrollbar-track { background: transparent; }
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .app-header {
    display: flex;
    align-items: center;
    gap: 14px;
    min-height: 54px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--line);
    background: color-mix(in srgb, var(--surface) 94%, transparent);
    backdrop-filter: blur(18px);
    position: relative;
    z-index: 5;
  }
  .app-brand { display: inline-flex; align-items: center; gap: 8px; flex: none; }
  .app-brand-mark {
    display: grid;
    place-items: center;
    width: 23px;
    height: 23px;
    border: 2px solid #efbd3d;
    border-radius: 7px;
    color: #efbd3d;
    font-size: 12px;
    font-weight: 700;
    transform: rotate(30deg);
  }
  .app-brand-mark > span { transform: rotate(-30deg); }
  .app-header h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .app-header .root {
    min-width: 0;
    overflow: hidden;
    color: var(--ink-3);
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .app-header .spacer { flex: 1; }
  #tick { color: var(--running); font-weight: 500; flex: none; }
  .header-button {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 32px;
    border: 0;
    border-radius: 9px;
    padding: 5px 9px;
    background: transparent;
    color: var(--ink-2);
    cursor: pointer;
  }
  .header-button:hover { background: var(--hover); }
  .header-button:focus-visible,
  .run-main:focus-visible,
  .run-pin:focus-visible,
  .chip:focus-visible,
  .side-reset:focus-visible,
  .agent-node:focus-visible,
  .flow-focus:focus-visible,
  .drawer-close:focus-visible {
    outline: 2px solid var(--running);
    outline-offset: 2px;
  }

  .layout {
    display: grid;
    grid-template-columns: 286px minmax(0, 1fr);
    min-height: 0;
  }
  .runs-sidebar {
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
    border-right: 1px solid var(--line);
    background: var(--surface);
    padding: 10px 8px 0;
  }
  .main-view {
    isolation: isolate;
    min-width: 0;
    overflow-y: auto;
    background:
      radial-gradient(circle at 78% -20%, color-mix(in srgb, #f3c7aa 17%, transparent), transparent 42%),
      var(--canvas);
    padding: clamp(16px, 2.5vw, 34px);
  }

  .side-tools {
    display: grid;
    flex: none;
    gap: 8px;
    padding: 4px 2px 10px;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .chip-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 2px 8px 2px 7px;
    background: transparent;
    color: var(--ink-3);
    font-size: 11px;
    line-height: 1.6;
    cursor: pointer;
  }
  .chip:hover { background: var(--hover); }
  .chip .dot { width: 6px; height: 6px; }
  .chip .dot.running { animation: none; }
  .chip[aria-pressed="false"] .dot { opacity: 0.45; }
  .chip-count { font-variant-numeric: tabular-nums; opacity: 0.8; }
  .chip[aria-pressed="true"] { border-color: transparent; }
  .chip[aria-pressed="true"][data-status="running"] { color: var(--running); background: var(--running-bg); }
  .chip[aria-pressed="true"][data-status="completed"] { color: var(--good); background: var(--good-bg); }
  .chip[aria-pressed="true"][data-status="failed"] { color: var(--bad); background: var(--bad-bg); }
  .chip[aria-pressed="true"][data-status="cancelled"],
  .chip[aria-pressed="true"][data-status="interrupted"] { color: var(--warn); background: var(--warn-bg); }
  .side-tools-row { display: flex; align-items: center; gap: 8px; }
  .select-wrap { display: inline-grid; grid-template-columns: 1fr 24px; align-items: center; }
  .select-wrap select {
    grid-column: 1 / -1;
    grid-row: 1;
    appearance: none;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 3px 22px 3px 8px;
    background: var(--surface);
    color: var(--ink-2);
    font: inherit;
    font-size: 11px;
    line-height: 1.6;
    cursor: pointer;
  }
  .select-wrap select:hover { background: var(--hover); }
  .select-wrap select:focus-visible { outline: 2px solid var(--running); outline-offset: 0; }
  .select-wrap svg { grid-column: 2; grid-row: 1; place-self: center; pointer-events: none; color: var(--ink-3); }
  .side-count {
    margin-left: auto;
    color: var(--ink-3);
    font-size: 10px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .side-reset {
    border: 0;
    border-radius: 7px;
    padding: 3px 7px;
    background: transparent;
    color: var(--running);
    font-size: 11px;
    cursor: pointer;
  }
  .side-reset:hover { background: var(--hover); }

  .side-list {
    display: grid;
    flex: 1;
    align-content: start;
    gap: 1px;
    min-height: 0;
    overflow-y: auto;
    padding-bottom: 24px;
  }
  .side-h {
    padding: 11px 10px 5px;
    color: var(--ink-3);
    font-family: ui-monospace, "SF Mono", "Geist Mono", Menlo, monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .run-item { position: relative; border-radius: 10px; color: var(--ink); }
  .run-item:hover { background: var(--hover); }
  .run-item.selected { background: var(--active); }
  .run-main {
    width: 100%;
    border: 0;
    border-radius: 10px;
    padding: 9px 30px 9px 10px;
    background: transparent;
    color: inherit;
    cursor: pointer;
    text-align: left;
  }
  .run-pin {
    position: absolute;
    top: 7px;
    right: 7px;
    display: grid;
    place-items: center;
    width: 22px;
    height: 22px;
    border: 0;
    border-radius: 7px;
    padding: 0;
    background: transparent;
    color: var(--ink-3);
    cursor: pointer;
    opacity: 0;
  }
  .run-item:hover .run-pin,
  .run-item:focus-within .run-pin,
  .run-pin[aria-pressed="true"] { opacity: 1; }
  .run-pin:hover { background: var(--active); color: var(--ink-2); }
  .run-pin[aria-pressed="true"] { color: var(--warn); }
  .run-pin svg { fill: currentColor; }
  .run-pin .hit { display: none; }
  @media (pointer: coarse) {
    .run-pin { opacity: 0.6; }
    .run-pin[aria-pressed="true"] { opacity: 1; }
    .run-pin .hit {
      display: block;
      position: absolute;
      top: 50%;
      left: 50%;
      width: max(100%, 44px);
      height: max(100%, 44px);
      transform: translate(-50%, -50%);
    }
  }
  .run-item .name {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
    overflow: hidden;
    font-weight: 500;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .run-item .sub {
    display: flex;
    align-items: center;
    gap: 6px;
    padding-left: 15px;
    margin-top: 3px;
    color: var(--ink-3);
    font-size: 11px;
  }
  .run-item .live {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
    padding-left: 15px;
    margin-top: 6px;
    color: var(--ink-2);
    font-size: 11px;
  }
  .run-item .live > span:nth-child(2) {
    flex: none;
    max-width: 44%;
    overflow: hidden;
    font-weight: 500;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .run-item .doing {
    min-width: 0;
    overflow: hidden;
    color: var(--ink-3);
    font-family: ui-monospace, "SF Mono", "Geist Mono", Menlo, monospace;
    font-size: 10px;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
  .dot.running { background: var(--running); animation: pulse 1.4s ease-in-out infinite; }
  .dot.queued { border: 1px solid var(--running); background: transparent; }
  .dot.completed { background: var(--good); }
  .dot.failed { background: var(--bad); }
  .dot.cached { background: var(--cached); }
  .dot.cancelled, .dot.interrupted, .dot.stalled { background: var(--warn); }
  .dot.pending { border: 1px solid var(--pending); background: transparent; }
  .run-item .live .dot { width: 5px; height: 5px; }
  @keyframes pulse { 50% { opacity: .35; } }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    flex: none;
    border-radius: 999px;
    padding: 1px 8px 1px 6px;
    font-size: 11px;
    font-weight: 500;
    line-height: 1.6;
    white-space: nowrap;
  }
  .pill.running { color: var(--running); background: var(--running-bg); }
  .pill.queued { color: var(--running); background: var(--running-bg); }
  .pill.completed { color: var(--good); background: var(--good-bg); }
  .pill.failed { color: var(--bad); background: var(--bad-bg); }
  .pill.cancelled, .pill.interrupted, .pill.stalled { color: var(--warn); background: var(--warn-bg); }
  .pill.cached { color: var(--cached); background: var(--cached-bg); }

  .workflow-shell { width: min(100%, 1500px); margin-inline: auto; }
  .workflow-card {
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 24px;
    background: var(--surface);
    box-shadow: var(--shadow-card);
  }
  .workflow-titlebar {
    display: flex;
    align-items: center;
    gap: 14px;
    min-height: 70px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
  }
  .workflow-symbol {
    display: grid;
    place-items: center;
    flex: none;
    width: 25px;
    height: 25px;
    border: 3px solid #efbd3d;
    border-radius: 8px;
    color: #efbd3d;
    font-size: 11px;
    font-weight: 700;
    transform: rotate(30deg);
  }
  .workflow-symbol > span { transform: rotate(-30deg); }
  .workflow-heading { min-width: 0; flex: 1; }
  .workflow-heading h2 {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.02em;
    text-wrap: balance;
  }
  .workflow-heading h2 .title {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .workflow-heading .description {
    max-width: 70ch;
    margin-top: 2px;
    overflow: hidden;
    color: var(--ink-2);
    font-size: 12px;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .workflow-number { color: var(--ink-3); font-weight: 400; }
  .workflow-owner {
    display: flex;
    align-items: center;
    gap: 9px;
    flex: none;
    color: var(--ink-2);
  }
  .creator-label { color: var(--ink-3); }
  .creator-avatar {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: linear-gradient(145deg, #ffe4a4, #ffb671 62%, #ff8f72);
    box-shadow: inset 0 0 0 1px rgb(255 255 255 / 0.5);
  }
  .workflow-error {
    border-bottom: 1px solid color-mix(in srgb, var(--bad) 18%, transparent);
    padding: 9px 20px;
    background: var(--bad-bg);
    color: var(--bad);
    word-break: break-word;
  }

  .flow-viewport {
    position: relative;
    min-height: 440px;
    overflow: auto;
    overscroll-behavior: contain;
    background-color: var(--surface-2);
    background-image: radial-gradient(circle, color-mix(in srgb, var(--ink-3) 25%, transparent) 1px, transparent 1px);
    background-position: 0 0;
    background-size: 22px 22px;
  }
  .flow-stage {
    position: relative;
    width: max(100%, var(--stage-width));
    min-height: 440px;
    padding: 30px 42px 70px;
  }
  .flow-edges {
    position: absolute;
    inset: 0;
    z-index: 1;
    overflow: visible;
    pointer-events: none;
  }
  .flow-edge {
    fill: none;
    stroke: var(--edge);
    stroke-width: 2;
    stroke-linecap: round;
  }
  .flow-edge.completed { stroke: color-mix(in srgb, var(--good) 32%, var(--edge)); }
  .flow-edge.failed { stroke: color-mix(in srgb, var(--bad) 42%, var(--edge)); }
  .flow-edge.cached { stroke: color-mix(in srgb, var(--cached) 45%, var(--edge)); }
  .flow-edge.running {
    stroke: color-mix(in srgb, var(--running) 62%, var(--edge));
    stroke-dasharray: 7 7;
    animation: edge-flow 1.2s linear infinite;
  }
  .flow-edge.queued {
    stroke: color-mix(in srgb, var(--running) 34%, var(--edge));
    stroke-dasharray: 3 8;
  }
  @keyframes edge-flow { to { stroke-dashoffset: -14; } }

  .flow-grid {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: repeat(var(--phase-count), minmax(210px, 1fr));
    align-items: start;
    gap: 74px;
  }
  .phase-column { min-width: 0; }
  .phase-heading {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 24px;
    margin-bottom: 18px;
    color: var(--ink-2);
    font-size: 11px;
  }
  .phase-index {
    color: var(--ink-3);
    font-family: ui-monospace, "SF Mono", "Geist Mono", Menlo, monospace;
    font-size: 10px;
    font-variant-numeric: tabular-nums;
  }
  .phase-name {
    min-width: 0;
    overflow: hidden;
    font-weight: 600;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .phase-count { color: var(--ink-3); font-variant-numeric: tabular-nums; }
  .phase-mode {
    flex: none;
    border-radius: 999px;
    padding: 1px 6px;
    background: var(--surface-3);
    color: var(--ink-3);
    font-family: ui-monospace, "SF Mono", "Geist Mono", Menlo, monospace;
    font-size: 9px;
  }
  .phase-hub {
    width: 8px;
    height: 8px;
    margin: 0 auto;
    border: 2px solid var(--pending);
    border-radius: 50%;
    background: var(--surface-2);
  }
  .phase-nodes { display: grid; min-width: 0; gap: 22px; }
  .phase-empty {
    max-width: 260px;
    border: 1px dashed var(--line-strong);
    border-radius: 14px;
    padding: 18px 14px;
    color: var(--ink-3);
    text-align: center;
  }

  .agent-node {
    position: relative;
    width: 100%;
    min-width: 0;
    max-width: 260px;
    border: 0;
    padding: 0;
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
  }
  .agent-node:disabled { cursor: default; opacity: 1; }
  .agent-node-main {
    display: flex;
    align-items: center;
    gap: 9px;
    width: 100%;
    min-width: 0;
    min-height: 44px;
    border-radius: 14px;
    padding: 9px 12px;
    background: var(--node);
    box-shadow: var(--shadow-xs), 0 0 0 1px var(--line);
  }
  .agent-node:hover .agent-node-main { background: color-mix(in srgb, var(--node) 96%, var(--ink)); }
  .agent-node:disabled:hover .agent-node-main { background: var(--node); }
  .agent-node.running .agent-node-main { box-shadow: var(--shadow-xs), 0 0 0 1px color-mix(in srgb, var(--running) 36%, var(--line)); }
  .agent-node.queued .agent-node-main { box-shadow: var(--shadow-xs), 0 0 0 1px color-mix(in srgb, var(--running) 20%, var(--line)); }
  .agent-node.failed .agent-node-main { box-shadow: var(--shadow-xs), 0 0 0 1px color-mix(in srgb, var(--bad) 38%, var(--line)); }
  .node-status {
    display: grid;
    place-items: center;
    flex: none;
    width: 19px;
    height: 19px;
    border: 2px solid var(--pending);
    border-radius: 50%;
    color: var(--pending);
    font-size: 11px;
    font-weight: 700;
    line-height: 1;
  }
  .node-status.completed { border-color: var(--good); background: var(--good); color: #fff; }

    .workflow-owner > span:last-child { display: none; }

    .workflow-progress { grid-template-columns: auto 1fr; }

  @media (prefers-reduced-motion: reduce) {
    .dot.running,
    .node-status.running,
    .flow-edge.running { animation: none; }
    * { scroll-behavior: auto !important; }
  }
</style>
</head>
<body>
<header class="app-header">
  <div class="app-brand"><span class="app-brand-mark" aria-hidden="true"><span>◇</span></span><h1>wiff</h1></div>
  <span class="root mono" id="root"></span>
  <span class="spacer"></span>
  <span id="tick"></span>
  <button class="header-button" id="theme" type="button" aria-label="Toggle theme"><span aria-hidden="true">◐</span><span class="theme-label">Theme</span></button>
</header>
<div class="layout">
  <aside class="runs-sidebar" aria-label="Workflow runs">
    <div class="side-tools">
      <div class="chip-row" id="status-filters" role="group" aria-label="Filter runs by status"></div>
      <div class="side-tools-row">
        <span class="select-wrap">
          <select id="launched-filter" name="launched" aria-label="Filter by last launched">
            <option value="all">Any time</option>
            <option value="24h">Last 24 hours</option>
            <option value="7d">Last 7 days</option>
            <option value="30d">Last 30 days</option>
          </select>
          <svg viewBox="0 0 8 5" width="8" height="5" fill="none" aria-hidden="true"><path d="M.5.5 4 4 7.5.5" stroke="currentColor"/></svg>
        </span>
        <button class="side-reset" id="filters-reset" type="button" hidden>Reset</button>
        <span class="side-count" id="side-count"></span>
      </div>
    </div>
    <div class="side-list" id="runs"></div>
  </aside>
  <main class="main-view" id="main"><div class="empty">Loading runs…</div></main>
</div>
<button class="sheet-backdrop" id="backdrop" type="button" aria-label="Close transcript"></button>
<div class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
  <header class="drawer-header">
    <h1 id="drawer-title" class="mono"></h1>
    <span class="drawer-meta mono" id="drawer-meta"></span>
    <span class="spacer"></span>
    <span class="drawer-live" id="drawer-live"></span>
    <button class="drawer-close" id="drawer-close" type="button" aria-label="Close transcript">✕ close</button>
  </header>
  <div class="body" id="drawer-body"></div>
</div>
<script>
const $ = (id) => document.getElementById(id);
let selectedRunId = null;
let runsCache = [];
let detail = null;
let structureKey = "";
let agentsIndex = new Map();
let drawer = null;
let activeAgents = [];
let visualJsonPromise = null;
let visualJsonUnavailable = false;
let visualJsonRoots = [];

function ensureVisualJson() {
  if (visualJsonUnavailable) return Promise.resolve(null);
  if (!visualJsonPromise) {
    visualJsonPromise = Promise.all([
      import("https://esm.sh/react@19.2.0"),
      import("https://esm.sh/react-dom@19.2.0/client?deps=react@19.2.0"),
      import("https://esm.sh/@visual-json/react@0.4.0?deps=react@19.2.0"),
    ]).then(([React, ReactDom, VisualJsonModule]) => ({
      createElement: React.createElement,
      createRoot: ReactDom.createRoot,
      VisualJson: VisualJsonModule.VisualJson,
      TreeView: VisualJsonModule.TreeView,
    })).catch(() => {
      visualJsonUnavailable = true;
      return null;
    });
  }
  return visualJsonPromise;
}

function unmountVisualJsonRoots() {
  for (const root of visualJsonRoots) {
    try { root.unmount(); } catch {}
  }
  visualJsonRoots = [];
}

const savedTheme = localStorage.getItem("cwf-theme");
if (savedTheme) document.documentElement.dataset.theme = savedTheme;
else if (matchMedia("(prefers-color-scheme: dark)").matches) document.documentElement.dataset.theme = "dark";
$("theme").onclick = () => {
  const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  document.documentElement.dataset.theme = next;
  localStorage.setItem("cwf-theme", next);
  requestAnimationFrame(drawConnectors);
};

const esc = (value) => String(value ?? "").replace(/[&<>"]/g, (character) => ({
  "&": "&amp;",
  "<": "&lt;",
  ">": "&gt;",
  '"': "&quot;",
}[character]));
const fmtDur = (ms) => {
  if (ms == null || Number.isNaN(ms)) return "";
  if (ms < 1000) return `${Math.round(ms)}ms`;
  if (ms < 60_000) return `${(ms / 1000).toFixed(1)}s`;
  return `${Math.floor(ms / 60_000)}m ${Math.round((ms % 60_000) / 1000)}s`;
};
const fmtTime = (iso) => (iso ? new Date(iso).toLocaleTimeString() : "");
const fmtTokens = (number) => new Intl.NumberFormat("en", { notation: "compact", maximumFractionDigits: 1 }).format(number);
const STATUS_ICON = { queued: "…", running: "•", completed: "✓", failed: "×", cached: "↻", cancelled: "–", interrupted: "Ⅱ", stalled: "!", pending: "" };
const KIND_ICON = { exec: "›", edit: "✎", thinking: "…", message: "·", search: "⌕", tool: "⌘" };
const pill = (status) => `<span class="pill ${esc(status)}">${STATUS_ICON[status] ?? ""} ${esc(status)}</span>`;
const nowLine = (activity) => (activity ? `${KIND_ICON[activity.kind] ?? "·"} ${activity.text}` : "");
const slugify = (value) => String(value ?? "phase").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "phase";
const displayRunStatus = (run) =>
  run.status === "running" && run.ownerResponsive === false ? "stalled" : run.status;

const STATUS_FILTERS = ["running", "completed", "failed", "cancelled", "interrupted"];
const LAUNCHED_WINDOWS = { all: Number.POSITIVE_INFINITY, "24h": 86_400_000, "7d": 604_800_000, "30d": 2_592_000_000 };
const store = {
  load(key, fallback) {
    try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; }
  },
  save(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch { /* storage unavailable */ }
  },
};
const savedFilters = store.load("cwf-run-filters", {});
const filters = {
  statuses: Array.isArray(savedFilters.statuses)
    ? savedFilters.statuses.filter((status) => STATUS_FILTERS.includes(status))
    : [...STATUS_FILTERS],
  launched: savedFilters.launched in LAUNCHED_WINDOWS ? savedFilters.launched : "all",
};
let pins = store.load("cwf-run-pins", []);
if (!Array.isArray(pins)) pins = [];

const filtersActive = () => filters.launched !== "all" || filters.statuses.length < STATUS_FILTERS.length;

function visibleRuns() {
  const window = LAUNCHED_WINDOWS[filters.launched] ?? Number.POSITIVE_INFINITY;
  const now = Date.now();
  return runsCache.filter((run) => filters.statuses.includes(run.status) && now - +new Date(run.startedAt) <= window);
}

function buildFilterBar() {
  $("status-filters").innerHTML = STATUS_FILTERS.map((status) => `<button class="chip" type="button"
      data-status="${status}" aria-pressed="${filters.statuses.includes(status)}">
    <span class="dot ${status}" aria-hidden="true"></span>${status}<span class="chip-count" data-count-for="${status}">0</span>
  </button>`).join("");
  $("launched-filter").value = filters.launched;
}

function updateFilterBar() {
  const window = LAUNCHED_WINDOWS[filters.launched] ?? Number.POSITIVE_INFINITY;
  const now = Date.now();
  const pool = runsCache.filter((run) => now - +new Date(run.startedAt) <= window);
  for (const status of STATUS_FILTERS) {
    const count = $("status-filters").querySelector(`[data-count-for="${status}"]`);
    if (count) count.textContent = pool.filter((run) => run.status === status).length;
  }
  const total = runsCache.length;
  $("side-count").textContent = total ? (filtersActive() ? `${visibleRuns().length} of ${total}` : `${total}`) : "";
  $("filters-reset").hidden = !filtersActive();
}

function resetFilters() {
  filters.statuses = [...STATUS_FILTERS];
  filters.launched = "all";
  store.save("cwf-run-filters", filters);
  buildFilterBar();
  renderRunsList();
}

function togglePin(runId) {
  pins = pins.includes(runId) ? pins.filter((id) => id !== runId) : [runId, ...pins];
  store.save("cwf-run-pins", pins);
  renderRunsList();
}

async function fetchJson(url) {
  const response = await fetch(url);
  if (!response.ok) throw new Error((await response.json().catch(() => ({}))).error ?? response.statusText);
  return response.json();
}

function deriveAgents(journal) {
  const byKey = new Map();
  for (const event of journal) {
    if (event.type === "agent.queued") {
      byKey.set(event.key, {
        key: event.key,
        label: event.label ?? event.key,
        phase: event.phase ?? "default",
        sequence: event.sequence,
        status: "queued",
        queuedAt: event.at,
        options: event.options ?? {},
        transcript: event.transcriptPath?.split("/").pop(),
        worktreePath: event.worktreePath,
      });
    } else if (event.type === "agent.started") {
      const queued = byKey.get(event.key);
      byKey.set(event.key, {
        key: event.key,
        label: event.label ?? queued?.label ?? event.key,
        phase: event.phase ?? queued?.phase ?? "default",
        sequence: event.sequence ?? queued?.sequence,
        status: "running",
        queuedAt: event.queuedAt ?? queued?.queuedAt,
        startedAt: event.at,
        queueMs: event.queueMs,
        options: event.options ?? queued?.options ?? {},
        transcript: event.transcriptPath?.split("/").pop() ?? queued?.transcript,
        worktreePath: event.worktreePath ?? queued?.worktreePath,
      });
    } else if (event.type === "agent.completed" || event.type === "agent.failed") {
      const row = byKey.get(event.key) ?? {
        key: event.key,
        label: event.label ?? event.key,
        phase: event.phase ?? "default",
        sequence: event.sequence,
        options: event.options ?? {},
      };
      row.status = event.type === "agent.completed" ? "completed" : "failed";
      row.endedAt = event.at;
      row.queuedAt = event.queuedAt ?? row.queuedAt;
      row.startedAt = event.startedAt ?? row.startedAt;
      row.queueMs = event.queueMs ?? row.queueMs;
      row.executionMs = event.executionMs;
      row.usage = event.usage;
      row.error = event.error?.message;
      row.worktreePath = event.worktreePath ?? row.worktreePath;
      row.worktreeKept = event.worktreeKept;
      row.transcript = row.transcript ?? event.transcriptPath?.split("/").pop();
      byKey.set(event.key, row);
    } else if (event.type === "agent.cached") {
      const prior = byKey.get(event.key);
      byKey.set(event.key, {
        key: event.key,
        label: prior?.label ?? event.label ?? event.key,
        phase: prior?.phase ?? event.phase ?? "cached",
        sequence: event.sequence ?? prior?.sequence,
        status: "cached",
        startedAt: event.at,
        endedAt: event.at,
        options: prior?.options ?? event.options ?? {},
        usage: prior?.usage,
        transcript: prior?.transcript,
        worktreePath: event.worktreePath,
        worktreeKept: event.worktreeKept,
      });
    }
  }
  return [...byKey.values()];
}

function plannedPhases(run) {
  return (run.meta?.phases ?? []).map((phase) => typeof phase === "string" ? { title: phase } : phase).filter((phase) => phase?.title);
}

function phaseGroups(agents, run = {}, journal = []) {
  const order = [];
  const details = new Map();
  const add = (name, detail) => {
    if (!name) return;
    if (!details.has(name)) order.push(name);
    details.set(name, detail ?? details.get(name) ?? "");
  };
  for (const phase of plannedPhases(run)) add(phase.title, phase.detail);
  for (const event of journal) if (event.type === "phase") add(event.name, event.detail);
  for (const agent of [...agents].sort((left, right) =>
    (left.sequence ?? Number.MAX_SAFE_INTEGER) - (right.sequence ?? Number.MAX_SAFE_INTEGER)
    || String(left.startedAt ?? "").localeCompare(String(right.startedAt ?? "")))) add(agent.phase);

  const byPhase = new Map(order.map((phase) => [phase, []]));
  for (const agent of agents) {
    if (!byPhase.has(agent.phase)) byPhase.set(agent.phase, []);
    byPhase.get(agent.phase).push(agent);
  }
  for (const members of byPhase.values()) {
    members.sort((left, right) =>
      (left.sequence ?? Number.MAX_SAFE_INTEGER) - (right.sequence ?? Number.MAX_SAFE_INTEGER)
      || String(left.startedAt ?? "").localeCompare(String(right.startedAt ?? "")));
  }
  return [...byPhase.entries()].map(([phase, members]) => ({ phase, detail: details.get(phase), members }));
}

function maxConcurrency(members, now) {
  const points = [];
  for (const member of members) {
    if (!member.startedAt) continue;
    points.push([+new Date(member.startedAt), 1]);
    points.push([+new Date(member.endedAt ?? now), -1]);
  }
  points.sort((left, right) => left[0] - right[0] || left[1] - right[1]);
  let current = 0;
  let maximum = 0;
  for (const [, delta] of points) {
    current += delta;
    maximum = Math.max(maximum, current);
  }
  return maximum;
}

function phaseMode(members) {
  if (members.length < 2) return "";
  const maximum = maxConcurrency(members, Date.now());
  return maximum > 1 ? `∥ ×${maximum}` : "→";
}

function phaseStatus(members) {
  if (!members.length) return "pending";
  if (members.some((member) => member.status === "failed")) return "failed";
  if (members.some((member) => member.status === "running")) return "running";
  if (members.some((member) => member.status === "queued")) return "queued";
  if (members.every((member) => member.status === "cached")) return "cached";
  if (members.every((member) => member.status === "completed" || member.status === "cached")) return "completed";
  return "pending";
}

function agentTone(agent) {
  let value = 0;
  for (const character of `${agent.options.agentType ?? ""}${agent.options.model ?? ""}${agent.key}`) value = (value * 31 + character.charCodeAt(0)) >>> 0;
  return value % 5;
}

function runItem(run) {
  const live = run.status === "running" ? activeAgents.filter((agent) => agent.runId === run.runId) : [];
  const displayStatus = displayRunStatus(run);
  const pinned = pins.includes(run.runId);
  const selected = run.runId === selectedRunId;
  return `
    <div class="run-item ${selected ? "selected" : ""}">
      <button class="run-main" type="button" data-run="${esc(run.runId)}" ${selected ? 'aria-current="true"' : ""}>
        <span class="name"><span class="dot ${esc(displayStatus)}"></span>${esc(run.name ?? run.runId)}</span>
        <span class="sub">${pill(displayStatus)} · ${fmtTime(run.startedAt)}</span>
        <span class="sub mono">${esc(run.runId.slice(0, 14))}… · ${run.stats ? `${run.stats.completed}✓ ${run.stats.failed}× ${run.stats.cached}↻ ${run.stats.queued ?? 0} queued` : ""}</span>
        ${live.map((agent) => `<span class="live" title="${esc(agent.activity?.text ?? agent.key)}">
          <span class="dot ${esc(agent.status)}"></span><span>${esc(agent.label)}</span><span class="doing">${esc(agent.status === "queued" ? "waiting to execute" : nowLine(agent.activity))}</span>
        </span>`).join("")}
      </button>
      <button class="run-pin" type="button" data-pin="${esc(run.runId)}" aria-pressed="${pinned}"
          title="${pinned ? "Unpin" : "Pin"} run" aria-label="${pinned ? "Unpin" : "Pin"} ${esc(run.name ?? run.runId)}">
        <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path d="M3 3.5A1.5 1.5 0 0 1 4.5 2h7A1.5 1.5 0 0 1 13 3.5v9.19a.75.75 0 0 1-1.172.62L8 10.51l-3.828 2.8A.75.75 0 0 1 3 12.69V3.5Z"/></svg>
        <span class="hit" aria-hidden="true"></span>
      </button>
    </div>`;
}

function renderRunsList() {
  const pinSet = new Set(pins);
  const visible = visibleRuns();
  const pinned = visible.filter((run) => pinSet.has(run.runId));
  const unpinned = visible.filter((run) => !pinSet.has(run.runId));
  const running = unpinned.filter((run) => run.status === "running");
  const rest = unpinned.filter((run) => run.status !== "running");
  $("runs").innerHTML = [
    pinned.length ? `<div class="side-h">Pinned</div>${pinned.map(runItem).join("")}` : "",
    running.length ? `<div class="side-h">Running</div>${running.map(runItem).join("")}` : "",
    rest.length ? `<div class="side-h">${pinned.length || running.length ? "History" : "Runs"}</div>${rest.map(runItem).join("")}` : "",
  ].join("") || (runsCache.length
    ? `<div class="empty">No runs match these filters.<br /><button class="side-reset" type="button" data-clear-filters>Clear filters</button></div>`
    : `<div class="empty">No runs yet.</div>`);
  updateFilterBar();
}

function computeStructureKey(run, agents, journal) {
  return [
    run.runId,
    run.status,
    run.ownerResponsive,
    run.attempt,
    run.worktrees?.length ?? 0,
    run.result == null ? 0 : 1,
    JSON.stringify(plannedPhases(run)),
    journal.filter((event) => event.type === "phase").map((event) => event.name).join("|"),
    agents.map((agent) => `${agent.key}:${agent.phase}:${agent.status}`).join("|"),
  ].join("§");
}

function agentDisplay(agent) {
  if (agent.options.agentType) return `@${agent.options.agentType}`;
  if (agent.options.model) return agent.options.model;
  return "agent";
}

function agentNode(agent) {
  const transcriptReady = agent.status !== "queued" && agent.transcript;
  const tags = [
    agent.options.effort ? { text: agent.options.effort, kind: "effort" } : null,
    agent.options.sandbox ? { text: agent.options.sandbox, kind: "" } : null,
    agent.worktreePath ? { text: `worktree${agent.worktreeKept ? " · kept" : ""}`, kind: "worktree" } : null,
    agent.queueMs > 0 ? { text: `queued ${fmtDur(agent.queueMs)}`, kind: "" } : null,
  ].filter(Boolean);
  return `<button class="agent-node ${esc(agent.status)}" type="button"
      data-node="${esc(agent.key)}" data-status="${esc(agent.status)}" data-card="${esc(agent.key)}"
      data-transcript="${esc(agent.transcript ?? "")}" data-label="${esc(agent.label)}"
      ${transcriptReady ? "" : "disabled"} title="${esc(transcriptReady ? `Open ${agent.label} transcript` : agent.label)}">
    <span class="agent-node-main" data-status="${esc(agent.status)}">
      <span class="node-status ${esc(agent.status)}" aria-hidden="true">${STATUS_ICON[agent.status] ?? ""}</span>
      <span class="sr-only">${esc(agent.status)}</span>
      <span class="node-label">${esc(agent.label)}</span>
    </span>
    <span class="agent-node-owner">
      <span class="agent-orb tone-${agentTone(agent)}" aria-hidden="true"></span>
      <span class="node-owner-label">${esc(agentDisplay(agent))}</span>
      <span class="node-duration" data-dur></span>
    </span>
    ${tags.length ? `<span class="node-tags">${tags.map((tag) => `<span class="node-tag ${tag.kind}">${esc(tag.text)}</span>`).join("")}</span>` : ""}
    <span class="node-activity" data-now></span>
    ${agent.error ? `<span class="node-error" title="${esc(agent.error)}">${esc(agent.error)}</span>` : ""}
  </button>`;
}

function phaseColumn(group, index) {
  const status = phaseStatus(group.members);
  const mode = phaseMode(group.members);
  return `<section class="phase-column" id="phase-${slugify(group.phase)}-${index}" role="listitem" data-status="${status}">
    <div class="phase-heading" title="${esc(group.detail ?? group.phase)}">
      <span class="phase-index">${String(index + 1).padStart(2, "0")}</span>
      <span class="phase-name">${esc(group.phase)}</span>
      <span class="phase-count">${group.members.length}</span>
      ${mode ? `<span class="phase-mode">${mode}</span>` : ""}
    </div>
    <div class="phase-hub" aria-hidden="true"></div>
    <div class="phase-nodes">${group.members.map(agentNode).join("") || `<div class="phase-empty">Waiting for agents</div>`}</div>
  </section>`;
}

function progressDots(agents, total) {
  const statuses = agents.map((agent) => agent.status);
  while (statuses.length < total) statuses.push("pending");
  const visible = statuses.slice(0, 24);
  return `${visible.map((status, index) => `<span class="dot ${esc(status)}" title="Step ${index + 1}: ${esc(status)}"></span>`).join("")}${statuses.length > visible.length ? `<span class="progress-more">+${statuses.length - visible.length}</span>` : ""}`;
}

function renderSkeleton(run, agents, journal) {
  const groups = phaseGroups(agents, run, journal);
  if (!groups.length) groups.push({ phase: run.phase ?? "Workflow", detail: "", members: [] });
  const total = Math.max(run.stats?.requested ?? 0, agents.length);
  const done = agents.filter((agent) => agent.status === "completed" || agent.status === "cached").length;
  const logs = journal.filter((event) => event.type === "log" || event.type === "phase").slice(-12);
  const supportPanels = [
    `<section class="support-panel" id="run-activity"><h3>Activity</h3><div class="feed" id="activity-feed">${logs.length ? "" : `<div class="empty">No activity yet.</div>`}</div></section>`,
    run.worktrees?.length ? `<section class="support-panel" id="kept-worktrees"><h3>Kept worktrees</h3><div class="feed worktree-list">${run.worktrees.map((entry) =>
      `<div><span class="mono">${esc(entry.key)}</span><span class="mono path" title="${esc(entry.path)}">${esc(entry.path)}</span></div>`).join("")}</div></section>` : "",
    run.result !== undefined && run.result !== null ? `<details class="support-panel wide" id="run-result"><summary>Result</summary><pre class="result mono">${esc(JSON.stringify(run.result, null, 2))}</pre></details>` : "",
  ].filter(Boolean).join("");

  const stageWidth = Math.max(900, groups.length * 284);
  const runStatus = displayRunStatus(run);
  $("main").innerHTML = `<div class="workflow-shell">
    <article class="workflow-card">
      <header class="workflow-titlebar">
        <span class="workflow-symbol" aria-hidden="true"><span>◇</span></span>
        <div class="workflow-heading">
          <h2><span class="title">${esc(run.name ?? run.runId)}</span><span class="workflow-number">#${run.attempt ?? 1}</span>${pill(runStatus)}</h2>
          ${run.description ? `<p class="description">${esc(run.description)}</p>` : ""}
        </div>
        <div class="workflow-owner"><span class="creator-label">Creator</span><span class="creator-avatar" aria-hidden="true"></span><span>Wiff</span></div>
      </header>
      ${run.error ? `<div class="workflow-error">${STATUS_ICON.failed} ${esc(run.error.message)}</div>` : ""}
      ${runStatus === "stalled" ? `<div class="workflow-error">${STATUS_ICON.stalled} The workflow owner has not updated its heartbeat for ${esc(fmtDur(run.heartbeatAgeMs))}.</div>` : ""}
      <div class="flow-viewport" id="flow-viewport">
        <div class="flow-stage" id="flow-stage" style="--phase-count:${groups.length};--stage-width:${stageWidth}px">
          <svg class="flow-edges" id="flow-edges" aria-hidden="true"></svg>
          <div class="flow-grid" role="list" aria-label="Workflow phases">${groups.map(phaseColumn).join("")}</div>
        </div>
        <button class="flow-focus" type="button" data-flow-focus aria-label="Focus active workflow step" title="Focus active step">⌗</button>
      </div>
      <footer class="workflow-progress">
        <span class="progress-label">Progress</span>
        <span class="progress-dots">${progressDots(agents, total)}</span>
        <span class="progress-summary"><span><strong id="progress-count">${done}</strong>/${total || 0}</span><span id="elapsed"></span><span id="token-count">–</span></span>
      </footer>
    </article>
    <div class="run-context">
      <span><b>Run</b> <span class="mono">${esc(run.runId)}</span></span>
      <span><b>Phase</b> <span id="phase-slot">${esc(run.phase ?? "—")}</span></span>
      <span><b>Requested</b> <span id="requested-count">${run.stats?.requested ?? 0}</span></span>
      <span><b>Failed</b> <span id="failed-count">${run.stats?.failed ?? 0}</span></span>
      <span class="path" title="${esc(run.cwd ?? "")}"><b>Cwd</b> <span class="mono">${esc(run.cwd ?? "")}</span></span>
    </div>
    <div class="support-grid">${supportPanels}</div>
  </div>`;

  requestAnimationFrame(() => {
    drawConnectors();
    focusFlow(false);
  });
}

function connectorTargets(column) {
  const nodes = [...column.querySelectorAll(".agent-node-main")];
  return nodes.length ? nodes : [column.querySelector(".phase-hub")];
}

function drawConnectors() {
  const stage = $("flow-stage");
  const svg = $("flow-edges");
  if (!stage || !svg) return;
  const columns = [...stage.querySelectorAll(".phase-column")];
  const stageRect = stage.getBoundingClientRect();
  const width = stage.scrollWidth;
  const height = Math.max(stage.scrollHeight, 440);
  svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
  svg.setAttribute("width", width);
  svg.setAttribute("height", height);
  const paths = [];

  for (let columnIndex = 0; columnIndex < columns.length - 1; columnIndex += 1) {
    const sources = connectorTargets(columns[columnIndex]).filter(Boolean);
    const targets = connectorTargets(columns[columnIndex + 1]).filter(Boolean);
    const count = Math.max(sources.length, targets.length);
    for (let index = 0; index < count; index += 1) {
      const source = sources[Math.min(sources.length - 1, Math.floor(index * sources.length / count))];
      const target = targets[Math.min(targets.length - 1, Math.floor(index * targets.length / count))];
      if (!source || !target) continue;
      const sourceRect = source.getBoundingClientRect();
      const targetRect = target.getBoundingClientRect();
      const x1 = sourceRect.right - stageRect.left;
      const y1 = sourceRect.top + sourceRect.height / 2 - stageRect.top;
      const x2 = targetRect.left - stageRect.left;
      const y2 = targetRect.top + targetRect.height / 2 - stageRect.top;
      const bend = Math.max(30, (x2 - x1) * 0.48);
      const status = target.dataset.status ?? columns[columnIndex + 1].dataset.status ?? "pending";
      paths.push(`<path class="flow-edge ${esc(status)}" d="M ${x1.toFixed(1)} ${y1.toFixed(1)} C ${(x1 + bend).toFixed(1)} ${y1.toFixed(1)}, ${(x2 - bend).toFixed(1)} ${y2.toFixed(1)}, ${x2.toFixed(1)} ${y2.toFixed(1)}" />`);
    }
  }
  svg.innerHTML = paths.join("");
}

function focusFlow(smooth = true) {
  const viewport = $("flow-viewport");
  const stage = $("flow-stage");
  if (!viewport || !stage) return;
  const columns = [...stage.querySelectorAll(".phase-column")];
  const target = columns.find((column) => column.dataset.status === "running")
    ?? columns.find((column) => !["completed", "cached"].includes(column.dataset.status))
    ?? columns.at(-1);
  if (!target) return;
  const left = Math.max(0, target.offsetLeft - Math.max(24, (viewport.clientWidth - target.clientWidth) / 2));
  viewport.scrollTo({ left, behavior: smooth ? "smooth" : "auto" });
}

function updateDynamic() {
  if (!detail) return;
  const { run, journal, activity } = detail;
  const agents = [...agentsIndex.values()];
  const now = Date.now();
  const elapsed = (run.completedAt ? +new Date(run.completedAt) : now) - +new Date(run.startedAt);
  const elapsedElement = $("elapsed");
  if (elapsedElement) elapsedElement.textContent = fmtDur(elapsed);
  const phaseSlot = $("phase-slot");
  if (phaseSlot) phaseSlot.textContent = run.phase ?? "—";
  const requested = $("requested-count");
  if (requested) requested.textContent = run.stats?.requested ?? 0;
  const failed = $("failed-count");
  if (failed) failed.textContent = run.stats?.failed ?? 0;
  const progressCount = $("progress-count");
  if (progressCount) progressCount.textContent = agents.filter((agent) => agent.status === "completed" || agent.status === "cached").length;

  const totalTokens = agents.reduce((sum, agent) => sum + (agent.usage?.total?.totalTokens ?? 0), 0);
  const tokenCount = $("token-count");
  if (tokenCount) {
    tokenCount.textContent = totalTokens ? `${fmtTokens(totalTokens)} tokens` : "— tokens";
    tokenCount.title = totalTokens ? `${totalTokens.toLocaleString()} tokens across ${agents.length} agents` : "";
  }

  for (const agent of agents) {
    const node = document.querySelector(`[data-node="${CSS.escape(agent.key)}"]`);
    if (!node) continue;
    const duration = node.querySelector("[data-dur]");
    if (duration) {
      if (agent.status === "queued" && agent.queuedAt) {
        duration.textContent = `queued ${fmtDur(now - +new Date(agent.queuedAt))}`;
      } else if (agent.startedAt) {
        const to = agent.endedAt ? +new Date(agent.endedAt) : now;
        duration.textContent = fmtDur(agent.executionMs ?? to - +new Date(agent.startedAt));
      }
    }
    const doing = node.querySelector("[data-now]");
    if (doing) {
      const line = agent.status === "queued"
        ? "waiting to execute"
        : agent.status === "running" ? nowLine(activity?.[agent.key]) : "";
      doing.textContent = line;
      doing.title = line;
    }
  }

  const logs = journal.filter((event) => event.type === "log" || event.type === "phase").slice(-12);
  const feed = $("activity-feed");
  if (feed && String(logs.length) !== feed.dataset.count) {
    feed.dataset.count = String(logs.length);
    feed.innerHTML = logs.map((event) => `<div><span class="t mono">${fmtTime(event.at)}</span>${event.type === "phase"
      ? `<span class="phase-ev">phase → ${esc(event.name)}</span>`
      : `<span class="mono value">${esc(typeof event.value === "string" ? event.value : JSON.stringify(event.value))}</span>`}</div>`).join("") || `<div class="empty">No activity yet.</div>`;
  }
}

function applyDetail(payload) {
  detail = payload;
  const agents = deriveAgents(payload.journal);
  agentsIndex = new Map(agents.map((agent) => [agent.key, agent]));
  const key = computeStructureKey(payload.run, agents, payload.journal);
  if (key !== structureKey) {
    structureKey = key;
    renderSkeleton(payload.run, agents, payload.journal);
  }
  updateDynamic();
}

async function refreshRuns() {
  try {
    const payload = await fetchJson("/api/runs");
    runsCache = payload.runs;
    $("root").textContent = payload.root;
    if (!selectedRunId && runsCache.length) {
      const visible = visibleRuns();
      selectedRunId = (visible.find((run) => run.status === "running") ?? visible[0] ?? runsCache[0]).runId;
      await refreshDetail();
    }
    renderRunsList();
  } catch (error) {
    $("runs").innerHTML = `<div class="empty">${esc(error.message)}</div>`;
  }
}

async function refreshDetail() {
  if (!selectedRunId) return;
  try {
    applyDetail(await fetchJson(`/api/runs/${selectedRunId}`));
  } catch (error) {
    structureKey = "";
    $("main").innerHTML = `<div class="empty">${esc(error.message)}</div>`;
  }
}

async function refreshActive() {
  try {
    const payload = await fetchJson("/api/active");
    activeAgents = payload.agents;
    renderRunsList();
    $("tick").textContent = payload.agents.length
      ? `● ${payload.agents.length} agent${payload.agents.length === 1 ? "" : "s"} live`
      : "";
  } catch {
    // Transient — keep the previous live state.
  }
}

document.addEventListener("click", (event) => {
  const pinButton = event.target.closest("[data-pin]");
  if (pinButton) {
    togglePin(pinButton.dataset.pin);
    return;
  }
  if (event.target.closest("[data-clear-filters]")) {
    resetFilters();
    return;
  }
  const runButton = event.target.closest("[data-run]");
  if (runButton) {
    selectedRunId = runButton.dataset.run;
    structureKey = "";
    renderRunsList();
    refreshDetail();
    return;
  }
  if (event.target.closest("[data-flow-focus]")) {
    focusFlow(true);
    return;
  }
  const card = event.target.closest("[data-card]");
  if (card && card.dataset.transcript) {
    openDrawer(
      selectedRunId,
      card.dataset.transcript,
      card.dataset.label,
      ["queued", "running"].includes(agentsIndex.get(card.dataset.card)?.status),
      card.dataset.card,
    );
  }
});

async function renderDrawerBody() {
  if (!drawer) return;
  const drawerState = drawer;
  try {
    const payload = await fetchJson(`/api/runs/${drawerState.runId}/transcripts/${drawerState.file}`);
    if (drawer !== drawerState) return;
    const lastEvent = payload.events[payload.events.length - 1];
    const renderKey = `${payload.size}:${payload.events.length}:${lastEvent?.at ?? ""}`;
    if (!drawerState.firstLoad && drawerState.renderKey === renderKey) return;
    const body = $("drawer-body");
    const pinned = body.scrollHeight - body.scrollTop - body.clientHeight < 60;
    const treePayloads = [];
    const truncateText = (value) => {
      const text = String(value ?? "");
      return text.length > 4000 ? `${text.slice(0, 4000)}\n… (truncated)` : text;
    };
    const renderPre = (value) => `<pre class="mono">${esc(truncateText(value))}</pre>`;
    const renderTree = (value, fallbackText) => {
      const serialized = JSON.stringify(value);
      if (visualJsonUnavailable || serialized === undefined || serialized.length > 300000) return renderPre(fallbackText);
      const index = treePayloads.push({ value, fallbackText }) - 1;
      return `<div class="vj-tree" data-vj="${index}"></div>`;
    };
    const html = payload.events.map(({ at, event }) => {
      const item = event?.params?.item;
      let text = "";
      let content = "";
      if (item?.text || item?.summary_text) {
        text = item.text || item.summary_text;
        const trimmed = typeof text === "string" ? text.trim() : "";
        if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
          try {
            const parsed = JSON.parse(trimmed);
            if (parsed !== null && typeof parsed === "object") content = renderTree(parsed, text);
          } catch {}
        }
        if (!content) content = renderPre(text);
      } else if (item?.command) {
        content = renderPre(`$ ${item.command}`);
      } else if (item || event?.params?.delta) {
        return "";
      } else {
        const value = event?.params ?? event;
        text = JSON.stringify(value, null, 2);
        content = renderTree(value, text);
      }
      return `<div class="tr-event"><div class="m mono">${fmtTime(at)} · ${esc(event?.method ?? "")}${item?.type ? ` · ${esc(item.type)}` : ""}</div>${content}</div>`;
    }).join("") || `<div class="empty">No transcript events.</div>`;
    unmountVisualJsonRoots();
    body.innerHTML = html;
    drawerState.renderKey = renderKey;
    const shouldPin = pinned || drawerState.firstLoad;
    drawerState.firstLoad = false;
    if (shouldPin) body.scrollTop = body.scrollHeight;

    if (treePayloads.length) {
      const visualJson = await ensureVisualJson();
      if (drawer !== drawerState || drawerState.renderKey !== renderKey) return;
      for (const [index, treePayload] of treePayloads.entries()) {
        const placeholder = body.querySelector(`[data-vj="${index}"]`);
        if (!placeholder) continue;
        if (!visualJson) {
          const pre = document.createElement("pre");
          pre.className = "mono";
          pre.textContent = truncateText(treePayload.fallbackText);
          placeholder.replaceWith(pre);
          continue;
        }
        let root;
        try {
          root = visualJson.createRoot(placeholder);
          root.render(visualJson.createElement(
            visualJson.VisualJson,
            { value: treePayload.value, onChange: () => {} },
            visualJson.createElement(visualJson.TreeView, { showValues: true, showCounts: true }),
          ));
          visualJsonRoots.push(root);
        } catch {
          try { root?.unmount(); } catch {}
          const pre = document.createElement("pre");
          pre.className = "mono";
          pre.textContent = truncateText(treePayload.fallbackText);
          placeholder.replaceWith(pre);
        }
      }
      if (shouldPin) requestAnimationFrame(() => {
        if (drawer === drawerState) body.scrollTop = body.scrollHeight;
      });
    }
  } catch (error) {
    if (drawer !== drawerState) return;
    unmountVisualJsonRoots();
    $("drawer-body").innerHTML = `<div class="empty">${esc(error.message)}</div>`;
  }
}

function openDrawer(runId, file, label, live, agentKey) {
  drawer = { runId, file, label, live, agentKey, firstLoad: true };
  $("drawer-title").textContent = label;
  const options = agentsIndex.get(agentKey)?.options ?? {};
  $("drawer-meta").textContent = [options.agentType ? `@${options.agentType}` : options.model, options.effort]
    .filter(Boolean)
    .join(" · ");
  $("drawer-live").textContent = live ? "● live tail" : "";
  unmountVisualJsonRoots();
  $("drawer-body").innerHTML = `<div class="empty">Loading…</div>`;
  $("drawer").classList.add("open");
  $("backdrop").classList.add("open");
  renderDrawerBody();
}

function closeDrawer() {
  unmountVisualJsonRoots();
  drawer = null;
  $("drawer").classList.remove("open");
  $("backdrop").classList.remove("open");
}

$("drawer-close").onclick = closeDrawer;
$("backdrop").onclick = closeDrawer;
document.addEventListener("keydown", (event) => { if (event.key === "Escape") closeDrawer(); });
window.addEventListener("resize", () => requestAnimationFrame(drawConnectors));

$("status-filters").addEventListener("click", (event) => {
  const chip = event.target.closest("[data-status]");
  if (!chip) return;
  const status = chip.dataset.status;
  filters.statuses = filters.statuses.includes(status)
    ? filters.statuses.filter((item) => item !== status)
    : [...filters.statuses, status];
  chip.setAttribute("aria-pressed", String(filters.statuses.includes(status)));
  store.save("cwf-run-filters", filters);
  renderRunsList();
});
$("launched-filter").addEventListener("change", (event) => {
  filters.launched = event.target.value in LAUNCHED_WINDOWS ? event.target.value : "all";
  store.save("cwf-run-filters", filters);
  renderRunsList();
});
$("filters-reset").addEventListener("click", resetFilters);

buildFilterBar();
refreshRuns();
refreshActive();
setInterval(refreshRuns, 3000);
setInterval(refreshActive, 2000);
setInterval(() => {
  if (selectedRunId && (detail?.run?.status === "running" || !detail)) refreshDetail();
}, 1500);
setInterval(updateDynamic, 1000);
setInterval(() => {
  if (!drawer?.live) return;
  if (!["queued", "running"].includes(agentsIndex.get(drawer.agentKey)?.status)) {
    drawer.live = false;
    $("drawer-live").textContent = "";
    return;
  }
  renderDrawerBody();
}, 2000);
</script>
</body>
</html>
