<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>wiff</title>
<link rel="preconnect" href="https://rsms.me/" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<style>
  /* Semantic tokens, coss-style: zinc neutrals, opacity borders, status colors reserved.
     Variable names kept from the original structure (--surface/--ink/--line) since
     inline styles in the JS reference them. */
  :root {
    --surface: #ffffff;                    /* page + cards */
    --surface-2: #fafafa;                  /* wells / recessed content */
    --surface-3: rgb(9 9 11 / 0.06);       /* badges, tracks, soft fills */
    --ink: #18181b;
    --ink-2: #71717a;                      /* muted foreground */
    --ink-3: #a1a1aa;                      /* faint foreground */
    --line: rgb(9 9 11 / 0.08);
    --line-strong: rgb(9 9 11 / 0.15);
    --hover: rgb(9 9 11 / 0.04);
    --active: rgb(9 9 11 / 0.06);
    --overlay: rgb(0 0 0 / 0.32);
    --shadow-xs: 0 1px 2px rgb(0 0 0 / 0.05);
    --shadow-sheet: -16px 0 48px rgb(0 0 0 / 0.12);
    --running: #2f6bd8; --good: #0ca30c; --bad: #d94f2a; --warn: #b97a00; --cached: #71717a;
    --running-bg: #eef3fc; --good-bg: #eaf6ea; --bad-bg: #fceee8; --warn-bg: #faf2dc; --cached-bg: #f0f0f1;
  }
  [data-theme="dark"] {
    --surface: #09090b;
    --surface-2: #111113;
    --surface-3: rgb(255 255 255 / 0.08);
    --ink: #fafafa;
    --ink-2: #a1a1aa;
    --ink-3: #70707b;
    --line: rgb(255 255 255 / 0.09);
    --line-strong: rgb(255 255 255 / 0.16);
    --hover: rgb(255 255 255 / 0.05);
    --active: rgb(255 255 255 / 0.08);
    --overlay: rgb(0 0 0 / 0.55);
    --shadow-xs: none;
    --shadow-sheet: none;
    --running: #6f9ff0; --good: #4fc24f; --bad: #ec835a; --warn: #fab219; --cached: #8b8b94;
    --running-bg: #1c2a45; --good-bg: #162d16; --bad-bg: #3a2115; --warn-bg: #382e12; --cached-bg: #222225;
    color-scheme: dark;
  }

  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    font-family: InterVariable, Inter, ui-sans-serif, system-ui, sans-serif;
    font-feature-settings: "cv02", "cv03", "cv04", "cv11";
    font-size: 13px; line-height: 1.5;
    background: var(--surface); color: var(--ink);
    display: grid; grid-template-rows: auto 1fr; overflow: hidden;
  }
  code, .mono, kbd { font-family: ui-monospace, "SF Mono", "Geist Mono", Menlo, monospace; font-size: 12px; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }

  header {
    display: flex; align-items: center; gap: 12px; padding: 9px 16px;
    border-bottom: 1px solid var(--line); background: var(--surface);
  }
  header h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  header .root { color: var(--ink-3); font-size: 11px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  header .spacer { flex: 1; }
  button {
    font: inherit; color: var(--ink-2); background: none; border: none;
    border-radius: 8px; padding: 5px 10px; cursor: pointer; text-align: left;
  }
  button:hover { background: var(--hover); }
  #tick { color: var(--running); font-weight: 500; flex: none; }

  /* Sidebar section headers + live agent lines under running runs */
  .side-h {
    font-family: ui-monospace, "SF Mono", "Geist Mono", Menlo, monospace;
    font-size: 10px; text-transform: uppercase; letter-spacing: .08em; font-weight: 500;
    color: var(--ink-3); padding: 10px 10px 4px;
  }
  .run-item .live {
    display: flex; align-items: center; gap: 6px; margin-top: 5px; padding-left: 14px;
    color: var(--ink-2); font-size: 11px; overflow: hidden; white-space: nowrap;
  }
  .run-item .live .dot { width: 5px; height: 5px; }
  .run-item .live > span:nth-child(2) { font-weight: 500; flex: none; max-width: 45%; overflow: hidden; text-overflow: ellipsis; }
  .run-item .live .doing {
    color: var(--ink-3); overflow: hidden; text-overflow: ellipsis;
    font-family: ui-monospace, "SF Mono", "Geist Mono", Menlo, monospace; font-size: 10px;
  }

  .layout { display: grid; grid-template-columns: 300px 1fr; min-height: 0; }
  aside { border-right: 1px solid var(--line); overflow-y: auto; padding: 8px; }
  main { overflow-y: auto; padding: 20px 24px 64px; container-type: inline-size; }
  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    aside { border-right: none; border-bottom: 1px solid var(--line); display: flex; align-items: flex-start; gap: 4px; overflow-x: auto; overflow-y: hidden; padding: 8px 12px; }
    aside .side-h { flex: none; padding: 10px 4px 4px; }
    aside .run-item { min-width: 230px; flex: none; margin-bottom: 0; }
    main { padding: 16px 16px 48px; }
  }

  .run-item {
    display: block; width: 100%;
    padding: 8px 10px; border-radius: 8px; margin-bottom: 1px;
  }
  .run-item:hover { background: var(--hover); }
  .run-item.selected { background: var(--active); }
  .run-item .name { font-weight: 500; display: flex; align-items: center; gap: 7px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .run-item .sub { color: var(--ink-3); font-size: 11px; margin-top: 2px; display: flex; align-items: center; gap: 6px; padding-left: 14px; }

  .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
  .dot.running { background: var(--running); animation: pulse 1.4s ease-in-out infinite; }
  .dot.completed { background: var(--good); }
  .dot.failed { background: var(--bad); }
  .dot.cancelled, .dot.interrupted { background: var(--warn); }
  @keyframes pulse { 50% { opacity: .35; } }

  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 1px 8px 1px 6px; border-radius: 999px;
    font-size: 11px; font-weight: 500; line-height: 1.6;
    flex: none; white-space: nowrap; /* never squish or wrap — the label truncates instead */
  }
  .pill.running { color: var(--running); background: var(--running-bg); }
  .pill.completed { color: var(--good); background: var(--good-bg); }
  .pill.failed { color: var(--bad); background: var(--bad-bg); }
  .pill.cancelled, .pill.interrupted { color: var(--warn); background: var(--warn-bg); }
  .pill.cached { color: var(--cached); background: var(--cached-bg); }

  .run-head h2 { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; text-wrap: balance; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .run-head .desc { color: var(--ink-2); margin-top: 4px; max-width: 72ch; text-wrap: pretty; }
  .run-head .meta { display: flex; gap: 6px 18px; flex-wrap: wrap; color: var(--ink-3); font-size: 11px; margin-top: 10px; }
  .run-head .meta b { color: var(--ink-2); font-weight: 500; }

  /* Stats: divider-separated row, not boxes */
  .counters { display: flex; flex-wrap: wrap; row-gap: 10px; margin: 18px 0 2px; }
  .counter { padding: 2px 20px; border-left: 1px solid var(--line); min-width: 0; }
  .counter:first-child { padding-left: 0; border-left: none; }
  .counter .n { font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .counter .l { font-size: 11px; color: var(--ink-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  section { margin-top: 26px; }
  section > h3 {
    font-family: ui-monospace, "SF Mono", "Geist Mono", Menlo, monospace;
    font-size: 10px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--ink-3); margin-bottom: 10px; font-weight: 500;
  }

  /* Timeline (well) */
  .timeline { border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; background: var(--surface-2); }
  .tl-row { display: grid; grid-template-columns: 200px 1fr 118px; align-items: center; gap: 12px; padding: 3px 0; }
  .tl-row .tl-label { padding-left: 14px; }
  .tl-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--ink-2); font-size: 12px; }
  .tl-track { position: relative; height: 12px; background: var(--surface-3); border-radius: 4px; }
  .tl-bar { position: absolute; top: 2px; bottom: 2px; border-radius: 4px; min-width: 6px; }
  .tl-bar.running { background: var(--running); animation: pulse 1.4s ease-in-out infinite; }
  .tl-bar.completed { background: var(--good); }
  .tl-bar.failed { background: var(--bad); }
  .tl-bar.cached { background: var(--cached); }
  .tl-dur { color: var(--ink-3); font-size: 11px; text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .tl-phase {
    display: grid; grid-template-columns: 200px 1fr 118px; gap: 12px; align-items: center;
    padding: 9px 0 3px; margin-top: 7px; border-top: 1px dashed var(--line-strong);
  }
  .tl-phase:first-child { border-top: none; margin-top: 0; padding-top: 2px; }
  .tl-phase .name {
    font-weight: 600; font-size: 12px; display: flex; gap: 7px; align-items: center;
    overflow: hidden; white-space: nowrap;
  }
  .tl-phase-track { position: relative; height: 6px; }
  .tl-phase-bar {
    position: absolute; top: 0; bottom: 0; border-radius: 3px;
    background: var(--surface-3); outline: 1px solid var(--line-strong); min-width: 4px;
  }
  @container (max-width: 640px) {
    .tl-row, .tl-phase { grid-template-columns: 120px 1fr 90px; }
  }
  .mode-badge {
    font-size: 10px; padding: 1px 8px; border-radius: 999px; font-weight: 500; flex: none;
    letter-spacing: .02em;
  }
  .mode-badge.parallel { color: var(--running); background: var(--running-bg); }
  .mode-badge.series { color: var(--ink-2); background: var(--surface-3); }
  .tl-axis { display: flex; justify-content: space-between; color: var(--ink-3); font-size: 10px; margin-top: 8px; font-variant-numeric: tabular-nums; }
  .legend { display: flex; gap: 14px; margin-top: 10px; color: var(--ink-2); font-size: 11px; flex-wrap: wrap; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .swatch { width: 9px; height: 9px; border-radius: 3px; }

  /* Agent cards (clickable → cards are justified) */
  .phase-title { font-weight: 600; margin: 16px 0 8px; display: flex; gap: 8px; align-items: center; }
  .phase-title small { color: var(--ink-3); font-weight: 400; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 10px; }
  @container (max-width: 420px) { .cards { grid-template-columns: 1fr; } }
  .card {
    border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px;
    background: var(--surface); box-shadow: var(--shadow-xs); width: 100%;
  }
  .card:hover { background: var(--hover); }
  [data-theme="dark"] .card { border-color: var(--line-strong); }
  .card .top { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
  .card .label { font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 7px; }
  .badge {
    font-size: 10.5px; color: var(--ink-2); background: var(--surface-3);
    border-radius: 5px; padding: 1.5px 7px; white-space: nowrap;
  }
  .badge.wt { color: var(--warn); background: var(--warn-bg); }
  .card .now {
    margin-top: 8px; color: var(--ink-2); font-size: 11px;
    font-family: ui-monospace, "SF Mono", "Geist Mono", Menlo, monospace;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card .now:empty { display: none; }
  .card .err { color: var(--bad); font-size: 11px; margin-top: 7px; word-break: break-word; }

  .feed { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: var(--surface-2); }
  .feed div { padding: 6px 14px; display: flex; gap: 12px; min-width: 0; }
  .feed div + div { border-top: 1px solid var(--line); }
  .feed .t { color: var(--ink-3); font-variant-numeric: tabular-nums; flex: none; }
  .feed .phase-ev { color: var(--running); font-weight: 500; }

  pre.result {
    background: var(--surface-2); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px; overflow-x: auto; max-height: 320px; overflow-y: auto;
  }
  .error-banner {
    border: 1px solid color-mix(in srgb, var(--bad) 35%, transparent);
    background: var(--bad-bg); color: var(--bad);
    border-radius: 12px; padding: 10px 14px; margin-top: 16px; word-break: break-word;
  }
  .empty { color: var(--ink-3); padding: 48px 24px; text-align: center; text-wrap: pretty; }

  /* Transcript sheet */
  .sheet-backdrop { position: fixed; inset: 0; background: var(--overlay); z-index: 9; display: none; border-radius: 0; padding: 0; }
  .sheet-backdrop.open { display: block; }
  .sheet-backdrop:hover { background: var(--overlay); }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: min(640px, 88vw);
    background: var(--surface); border-left: 1px solid var(--line);
    box-shadow: var(--shadow-sheet); display: none; flex-direction: column; z-index: 10;
  }
  .drawer.open { display: flex; }
  .drawer header { justify-content: space-between; gap: 10px; }
  .drawer header h1 { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .drawer .body { overflow-y: auto; padding: 14px 18px; flex: 1; }
  .tr-event { margin-bottom: 12px; }
  .tr-event .m { color: var(--ink-3); font-size: 10px; font-variant-numeric: tabular-nums; }
  .tr-event pre {
    white-space: pre-wrap; word-break: break-word;
    background: var(--surface-2); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 10px; margin-top: 3px;
  }
</style>
</head>
<body>
<header>
  <h1>wiff</h1>
  <span class="root mono" id="root"></span>
  <span class="spacer"></span>
  <span class="root" id="tick"></span>
  <button id="theme" aria-label="Toggle theme">◐ theme</button>
</header>
<div class="layout">
  <aside id="runs"></aside>
  <main id="main"><div class="empty">Loading runs…</div></main>
</div>
<div class="sheet-backdrop" id="backdrop"></div>
<div class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
  <header>
    <h1 id="drawer-title" class="mono"></h1>
    <span class="root" id="drawer-live"></span>
    <button id="drawer-close" aria-label="Close transcript">✕ close</button>
  </header>
  <div class="body" id="drawer-body"></div>
</div>
<script>
const $ = (id) => document.getElementById(id);
let selectedRunId = null;
let runsCache = [];
let detail = null;          // { run, journal, activity }
let structureKey = "";      // full re-render only when this changes
let agentsIndex = new Map(); // key -> derived agent row
let drawer = null;          // { runId, file, label, live }

const savedTheme = localStorage.getItem("cwf-theme");
if (savedTheme) document.documentElement.dataset.theme = savedTheme;
else if (matchMedia("(prefers-color-scheme: dark)").matches) document.documentElement.dataset.theme = "dark";
$("theme").onclick = () => {
  const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  document.documentElement.dataset.theme = next;
  localStorage.setItem("cwf-theme", next);
};

const esc = (value) => String(value ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const fmtDur = (ms) => {
  if (ms == null || Number.isNaN(ms)) return "";
  if (ms < 1000) return `${Math.round(ms)}ms`;
  if (ms < 60_000) return `${(ms / 1000).toFixed(1)}s`;
  return `${Math.floor(ms / 60_000)}m ${Math.round((ms % 60_000) / 1000)}s`;
};
const fmtTime = (iso) => (iso ? new Date(iso).toLocaleTimeString() : "");
const fmtTokens = (n) => new Intl.NumberFormat("en", { notation: "compact", maximumFractionDigits: 1 }).format(n);
const STATUS_ICON = { running: "▶", completed: "✓", failed: "✕", cached: "↺", cancelled: "⊘", interrupted: "⏸" };
const KIND_ICON = { exec: "❯", edit: "✎", thinking: "…", message: "💬", search: "🔎", tool: "⚙" };
const pill = (status) => `<span class="pill ${esc(status)}">${STATUS_ICON[status] ?? ""} ${esc(status)}</span>`;
const nowLine = (activity) => (activity ? `${KIND_ICON[activity.kind] ?? "·"} ${activity.text}` : "");

async function fetchJson(url) {
  const response = await fetch(url);
  if (!response.ok) throw new Error((await response.json().catch(() => ({}))).error ?? response.statusText);
  return response.json();
}

// ---- data shaping -----------------------------------------------------------

function deriveAgents(journal) {
  const byKey = new Map();
  for (const event of journal) {
    if (event.type === "agent.started") {
      byKey.set(event.key, {
        key: event.key, label: event.label ?? event.key, phase: event.phase ?? "default",
        status: "running", startedAt: event.at, options: event.options ?? {},
        transcript: event.transcriptPath?.split("/").pop(), worktreePath: event.worktreePath,
      });
    } else if (event.type === "agent.completed" || event.type === "agent.failed") {
      const row = byKey.get(event.key) ?? { key: event.key, label: event.key, phase: "default", options: {} };
      row.status = event.type === "agent.completed" ? "completed" : "failed";
      row.endedAt = event.at;
      row.usage = event.usage;
      row.error = event.error?.message;
      row.worktreePath = event.worktreePath ?? row.worktreePath;
      row.worktreeKept = event.worktreeKept;
      row.transcript = row.transcript ?? event.transcriptPath?.split("/").pop();
      byKey.set(event.key, row);
    } else if (event.type === "agent.cached") {
      // Keep label/options/usage from a prior attempt's completed event so cached
      // rows still show what they cost and count toward the run's token total.
      const prior = byKey.get(event.key);
      byKey.set(event.key, {
        key: event.key, label: prior?.label ?? event.key, phase: prior?.phase ?? "cached", status: "cached",
        startedAt: event.at, endedAt: event.at, options: prior?.options ?? {}, usage: prior?.usage,
        transcript: prior?.transcript,
        worktreePath: event.worktreePath, worktreeKept: event.worktreeKept,
      });
    }
  }
  return [...byKey.values()];
}

// Phases in first-start order, members sorted by start; series vs parallel from real overlap.
function phaseGroups(agents) {
  const byPhase = new Map();
  for (const agent of agents) {
    if (!byPhase.has(agent.phase)) byPhase.set(agent.phase, []);
    byPhase.get(agent.phase).push(agent);
  }
  const groups = [...byPhase.entries()].map(([phase, members]) => {
    members.sort((a, b) => String(a.startedAt ?? "").localeCompare(String(b.startedAt ?? "")));
    return { phase, members, firstStart: members[0]?.startedAt ?? "" };
  });
  groups.sort((a, b) => String(a.firstStart).localeCompare(String(b.firstStart)));
  return groups;
}

function maxConcurrency(members, now) {
  const points = [];
  for (const member of members) {
    if (!member.startedAt) continue;
    points.push([+new Date(member.startedAt), 1]);
    points.push([+new Date(member.endedAt ?? now), -1]);
  }
  points.sort((a, b) => a[0] - b[0] || a[1] - b[1]);
  let current = 0;
  let max = 0;
  for (const [, delta] of points) {
    current += delta;
    if (current > max) max = current;
  }
  return max;
}

function modeBadge(members) {
  if (members.length < 2) return "";
  const max = maxConcurrency(members, Date.now());
  return max > 1
    ? `<span class="mode-badge parallel">∥ parallel ×${max}</span>`
    : `<span class="mode-badge series">→ series</span>`;
}

// ---- runs sidebar (running workflows pinned on top, with live agent lines) ----

let activeAgents = [];

function runItem(run) {
  const live = run.status === "running"
    ? activeAgents.filter((agent) => agent.runId === run.runId)
    : [];
  return `
    <button class="run-item ${run.runId === selectedRunId ? "selected" : ""}" data-run="${esc(run.runId)}">
      <span class="name"><span class="dot ${esc(run.status)}"></span>${esc(run.name ?? run.runId)}</span>
      <div class="sub">${pill(run.status)} · ${fmtTime(run.startedAt)}</div>
      <div class="sub mono">${esc(run.runId.slice(0, 14))}… · ${run.stats ? `${run.stats.completed}✓ ${run.stats.failed}✕ ${run.stats.cached}↺` : ""}</div>
      ${live.map((agent) => `<div class="live" title="${esc(agent.activity?.text ?? agent.key)}">
        <span class="dot running"></span><span>${esc(agent.label)}</span><span class="doing">${esc(nowLine(agent.activity))}</span>
      </div>`).join("")}
    </button>`;
}

function renderRunsList() {
  const running = runsCache.filter((run) => run.status === "running");
  const rest = runsCache.filter((run) => run.status !== "running");
  $("runs").innerHTML = [
    running.length ? `<div class="side-h">Running</div>${running.map(runItem).join("")}` : "",
    rest.length ? `<div class="side-h">${running.length ? "History" : "Runs"}</div>${rest.map(runItem).join("")}` : "",
  ].join("") || `<div class="empty">No runs yet.</div>`;
}

// ---- run detail: skeleton render + in-place dynamic updates -------------------

function computeStructureKey(run, agents) {
  return [run.runId, run.status, run.attempt, agents.map((agent) => `${agent.key}:${agent.status}`).join("|")].join("§");
}

function timelineRow(agent) {
  return `<div class="tl-row" data-tl="${esc(agent.key)}">
    <span class="tl-label" title="${esc(agent.key)}">${esc(agent.label)}</span>
    <span class="tl-track"><span class="tl-bar ${esc(agent.status)}"></span></span>
    <span class="tl-dur"></span>
  </div>`;
}

function agentCard(agent) {
  const tokens = agent.usage?.total?.totalTokens;
  return `<button class="card" data-card="${esc(agent.key)}" data-transcript="${esc(agent.transcript ?? "")}" data-label="${esc(agent.label)}">
    <div class="top"><span class="label" title="${esc(agent.key)}">${esc(agent.label)}</span>${pill(agent.status)}</div>
    <div class="badges">
      ${agent.options.model ? `<span class="badge">${esc(agent.options.model)}</span>` : ""}
      ${agent.options.effort ? `<span class="badge">${esc(agent.options.effort)}</span>` : ""}
      ${agent.options.sandbox ? `<span class="badge">${esc(agent.options.sandbox)}</span>` : ""}
      ${agent.options.agentType ? `<span class="badge">@${esc(agent.options.agentType)}</span>` : ""}
      ${agent.worktreePath ? `<span class="badge wt">⎇ worktree${agent.worktreeKept ? " (kept)" : ""}</span>` : ""}
      <span class="badge" data-dur></span>
      ${tokens ? `<span class="badge">${tokens.toLocaleString()} tok</span>` : ""}
    </div>
    <div class="now" data-now></div>
    ${agent.error ? `<div class="err">${esc(agent.error)}</div>` : ""}
  </button>`;
}

function renderSkeleton(run, agents, journal) {
  const groups = phaseGroups(agents);
  const cards = groups.map(({ phase, members }) =>
    `<div class="phase-title">${esc(phase)} ${modeBadge(members)} <small>${members.length} agent${members.length === 1 ? "" : "s"}</small></div>
      <div class="cards">${members.map(agentCard).join("")}</div>`).join("");
  const timed = agents.filter((agent) => agent.startedAt);
  const timedGroups = groups
    .map(({ phase, members }) => ({ phase, members: members.filter((agent) => agent.startedAt) }))
    .filter(({ members }) => members.length);
  const logs = journal.filter((event) => event.type === "log" || event.type === "phase").slice(-80);

  $("main").innerHTML = `
    <div class="run-head">
      <h2>${esc(run.name ?? run.runId)} ${pill(run.status)}</h2>
      ${run.description ? `<div class="desc">${esc(run.description)}</div>` : ""}
      <div class="meta">
        <span><b>run</b> <span class="mono">${esc(run.runId)}</span></span>
        <span><b>elapsed</b> <span id="elapsed"></span></span>
        <span><b>attempt</b> ${run.attempt ?? 1}</span>
        <span id="phase-slot">${run.phase ? `<b>phase</b> ${esc(run.phase)}` : ""}</span>
        <span><b>cwd</b> <span class="mono">${esc(run.cwd ?? "")}</span></span>
      </div>
    </div>
    <div class="counters">${["requested", "running", "completed", "failed", "cached"].map((name) =>
      `<div class="counter"><div class="n" data-counter="${name}">0</div><div class="l">${name}</div></div>`).join("")}
      <div class="counter"><div class="n" data-counter="tokens">–</div><div class="l">tokens</div></div>
    </div>
    ${run.error ? `<div class="error-banner">${STATUS_ICON.failed} ${esc(run.error.message)}</div>` : ""}
    ${timed.length ? `<section><h3>Timeline</h3><div class="timeline">${timedGroups.map(({ phase, members }) =>
      `<div class="tl-phase" data-tlphase="${esc(phase)}">
        <span class="name">${esc(phase)} ${modeBadge(members)}</span>
        <span class="tl-phase-track"><span class="tl-phase-bar"></span></span>
        <span class="tl-dur" data-phasedur></span>
      </div>${members.map(timelineRow).join("")}`).join("")}
      <div class="tl-axis"><span id="tl-start"></span><span id="tl-span"></span><span id="tl-end"></span></div>
      <div class="legend">
        <span><span class="swatch" style="background:var(--running)"></span>running</span>
        <span><span class="swatch" style="background:var(--good)"></span>completed</span>
        <span><span class="swatch" style="background:var(--bad)"></span>failed</span>
        <span><span class="swatch" style="background:var(--cached)"></span>cached</span>
      </div></div></section>` : ""}
    <section><h3>Agents</h3>${cards || `<div class="empty">No agents yet.</div>`}</section>
    ${run.worktrees?.length ? `<section><h3>Kept worktrees</h3><div class="feed">${run.worktrees.map((entry) =>
      `<div><span class="mono">${esc(entry.key)}</span><span class="mono" style="color:var(--ink-3)">${esc(entry.path)}</span></div>`).join("")}</div></section>` : ""}
    <section id="activity-section" ${logs.length ? "" : "hidden"}><h3>Activity</h3><div class="feed" id="activity-feed"></div></section>
    ${run.result !== undefined && run.result !== null ? `<section><h3>Result</h3><pre class="result mono">${esc(JSON.stringify(run.result, null, 2))}</pre></section>` : ""}`;
}

function updateDynamic() {
  if (!detail) return;
  const { run, journal, activity } = detail;
  const agents = [...agentsIndex.values()];
  const now = Date.now();

  const elapsedEl = $("elapsed");
  if (elapsedEl) {
    elapsedEl.textContent = fmtDur(
      (run.completedAt ? +new Date(run.completedAt) : now) - +new Date(run.startedAt),
    );
  }
  const phaseSlot = $("phase-slot");
  if (phaseSlot && run.phase) phaseSlot.innerHTML = `<b>phase</b> ${esc(run.phase)}`;
  for (const name of ["requested", "running", "completed", "failed", "cached"]) {
    const el = document.querySelector(`[data-counter="${name}"]`);
    if (el) el.textContent = run.stats?.[name] ?? 0;
  }
  const tokensEl = document.querySelector('[data-counter="tokens"]');
  if (tokensEl) {
    const total = agents.reduce((sum, agent) => sum + (agent.usage?.total?.totalTokens ?? 0), 0);
    tokensEl.textContent = total ? fmtTokens(total) : "–";
    tokensEl.title = total ? `${total.toLocaleString()} tokens across ${agents.length} agents` : "";
  }

  // Timeline geometry.
  const timed = agents.filter((agent) => agent.startedAt);
  if (timed.length) {
    const start = Math.min(...timed.map((agent) => +new Date(agent.startedAt)));
    const end = Math.max(
      run.status === "running" ? now : 0,
      ...timed.map((agent) => +new Date(agent.endedAt ?? now)),
    );
    const span = Math.max(end - start, 1);
    for (const agent of timed) {
      const row = document.querySelector(`[data-tl="${CSS.escape(agent.key)}"]`);
      if (!row) continue;
      const from = +new Date(agent.startedAt);
      const to = agent.endedAt ? +new Date(agent.endedAt) : now;
      const bar = row.querySelector(".tl-bar");
      bar.style.left = `${((from - start) / span) * 100}%`;
      bar.style.width = `${Math.max(((to - from) / span) * 100, 0.8)}%`;
      bar.title = `${agent.label} — ${agent.status} · ${fmtDur(to - from)}`;
      row.querySelector(".tl-dur").textContent = fmtDur(to - from);
    }
    const startEl = $("tl-start");
    if (startEl) {
      startEl.textContent = fmtTime(new Date(start).toISOString());
      $("tl-span").textContent = fmtDur(span);
      $("tl-end").textContent = fmtTime(new Date(end).toISOString());
    }

    // Phase-range bars on the shared axis: sequential phases read as adjacent spans.
    for (const { phase, members } of phaseGroups(timed)) {
      const row = document.querySelector(`[data-tlphase="${CSS.escape(phase)}"]`);
      if (!row) continue;
      const from = Math.min(...members.map((agent) => +new Date(agent.startedAt)));
      const to = Math.max(...members.map((agent) => +new Date(agent.endedAt ?? now)));
      const bar = row.querySelector(".tl-phase-bar");
      bar.style.left = `${((from - start) / span) * 100}%`;
      bar.style.width = `${Math.max(((to - from) / span) * 100, 0.5)}%`;
      const phaseTokens = members.reduce((sum, m) => sum + (m.usage?.total?.totalTokens ?? 0), 0);
      bar.title = `${phase} — ${fmtDur(to - from)}${phaseTokens ? ` · ${phaseTokens.toLocaleString()} tok` : ""}`;
      row.querySelector("[data-phasedur]").textContent =
        `${fmtDur(to - from)}${phaseTokens ? ` · ${fmtTokens(phaseTokens)}` : ""}`;
    }
  }

  // Card durations + live "now doing" lines.
  for (const agent of agents) {
    const card = document.querySelector(`[data-card="${CSS.escape(agent.key)}"]`);
    if (!card) continue;
    const to = agent.endedAt ? +new Date(agent.endedAt) : now;
    const durEl = card.querySelector("[data-dur]");
    if (durEl && agent.startedAt) durEl.textContent = fmtDur(to - +new Date(agent.startedAt));
    const nowEl = card.querySelector("[data-now]");
    if (nowEl) {
      const line = agent.status === "running" ? nowLine(activity?.[agent.key]) : "";
      nowEl.textContent = line;
      nowEl.title = line;
    }
  }

  // Activity feed (no buttons inside — safe to rebuild when it grows).
  const logs = journal.filter((event) => event.type === "log" || event.type === "phase").slice(-80);
  const feed = $("activity-feed");
  if (feed && String(logs.length) !== feed.dataset.count) {
    feed.dataset.count = String(logs.length);
    $("activity-section").hidden = logs.length === 0;
    feed.innerHTML = logs.map((event) =>
      `<div><span class="t mono">${fmtTime(event.at)}</span>${event.type === "phase"
        ? `<span class="phase-ev">phase → ${esc(event.name)}</span>`
        : `<span class="mono">${esc(typeof event.value === "string" ? event.value : JSON.stringify(event.value))}</span>`}</div>`).join("");
  }
}

function applyDetail(payload) {
  detail = payload;
  const agents = deriveAgents(payload.journal);
  agentsIndex = new Map(agents.map((agent) => [agent.key, agent]));
  const key = computeStructureKey(payload.run, agents);
  if (key !== structureKey) {
    structureKey = key;
    renderSkeleton(payload.run, agents, payload.journal);
  }
  updateDynamic();
}

// ---- polling ------------------------------------------------------------------

async function refreshRuns() {
  try {
    const payload = await fetchJson("/api/runs");
    runsCache = payload.runs;
    $("root").textContent = payload.root;
    if (!selectedRunId && runsCache.length) {
      selectedRunId = (runsCache.find((run) => run.status === "running") ?? runsCache[0]).runId;
      await refreshDetail();
    }
    renderRunsList();
  } catch (error) {
    $("runs").innerHTML = `<div class="empty">${esc(error.message)}</div>`;
  }
}

async function refreshDetail() {
  if (!selectedRunId) return;
  try {
    applyDetail(await fetchJson(`/api/runs/${selectedRunId}`));
  } catch (error) {
    structureKey = "";
    $("main").innerHTML = `<div class="empty">${esc(error.message)}</div>`;
  }
}

async function refreshActive() {
  try {
    const payload = await fetchJson("/api/active");
    activeAgents = payload.agents;
    renderRunsList();
    $("tick").textContent = payload.agents.length
      ? `● ${payload.agents.length} agent${payload.agents.length === 1 ? "" : "s"} live`
      : "";
  } catch {
    // Transient — leave the sidebar as-is.
  }
}

// ---- interaction (delegated, survives re-renders) --------------------------------

document.addEventListener("click", (event) => {
  const runButton = event.target.closest("[data-run]");
  if (runButton) {
    selectedRunId = runButton.dataset.run;
    structureKey = "";
    renderRunsList();
    refreshDetail();
    return;
  }
  const card = event.target.closest("[data-card]");
  if (card && card.dataset.transcript) {
    openDrawer(selectedRunId, card.dataset.transcript, card.dataset.label,
      agentsIndex.get(card.dataset.card)?.status === "running");
  }
});

async function renderDrawerBody() {
  if (!drawer) return;
  try {
    const payload = await fetchJson(`/api/runs/${drawer.runId}/transcripts/${drawer.file}`);
    const body = $("drawer-body");
    const pinned = body.scrollHeight - body.scrollTop - body.clientHeight < 60;
    body.innerHTML = payload.events.map(({ at, event }) => {
      const item = event?.params?.item;
      let text = "";
      if (item?.text) text = item.text;
      else if (item?.summary_text) text = item.summary_text;
      else if (item?.command) text = `$ ${item.command}`;
      else if (item || event?.params?.delta) return ""; // empty items and stream deltas are noise
      else text = JSON.stringify(event?.params ?? event, null, 2);
      if (text.length > 4000) text = `${text.slice(0, 4000)}\n… (truncated)`;
      return `<div class="tr-event"><div class="m mono">${fmtTime(at)} · ${esc(event?.method ?? "")}${item?.type ? ` · ${esc(item.type)}` : ""}</div><pre class="mono">${esc(text)}</pre></div>`;
    }).join("") || `<div class="empty">No transcript events.</div>`;
    if (pinned || drawer.firstLoad) body.scrollTop = body.scrollHeight;
    drawer.firstLoad = false;
  } catch (error) {
    $("drawer-body").innerHTML = `<div class="empty">${esc(error.message)}</div>`;
  }
}

function openDrawer(runId, file, label, live) {
  drawer = { runId, file, label, live, firstLoad: true };
  $("drawer-title").textContent = label;
  $("drawer-live").textContent = live ? "● live tail" : "";
  $("drawer-body").innerHTML = `<div class="empty">Loading…</div>`;
  $("drawer").classList.add("open");
  $("backdrop").classList.add("open");
  renderDrawerBody();
}
function closeDrawer() {
  drawer = null;
  $("drawer").classList.remove("open");
  $("backdrop").classList.remove("open");
}
$("drawer-close").onclick = closeDrawer;
$("backdrop").onclick = closeDrawer;
document.addEventListener("keydown", (event) => { if (event.key === "Escape") closeDrawer(); });

// ---- timers ----------------------------------------------------------------------

refreshRuns();
refreshActive();
setInterval(refreshRuns, 3000);
setInterval(refreshActive, 2000);
setInterval(() => {
  if (selectedRunId && (detail?.run?.status === "running" || !detail)) refreshDetail();
}, 1500);
setInterval(updateDynamic, 1000);
setInterval(() => {
  if (drawer?.live) {
    if (agentsIndex.get(drawer.file?.split("-").slice(0, -1).join("-"))?.status !== "running") {
      $("drawer-live").textContent = "";
      drawer.live = false;
    }
    renderDrawerBody();
  }
}, 2000);
</script>
</body>
